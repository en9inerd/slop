name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build cross-platform binaries and .deb packages
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: bash ./scripts/build.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.value }}
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          REPO="en9inerd/slop"

          SHA_LINUX_X86=$(shasum -a 256 dist/slop_x86_64-linux-musl | awk '{print $1}')
          SHA_LINUX_ARM=$(shasum -a 256 dist/slop_aarch64-linux-musl | awk '{print $1}')
          SHA_MACOS_X86=$(shasum -a 256 dist/slop_x86_64-macos | awk '{print $1}')
          SHA_MACOS_ARM=$(shasum -a 256 dist/slop_aarch64-macos | awk '{print $1}')

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/en9inerd/homebrew-tap.git" /tmp/tap
          cp packaging/homebrew/slop.rb /tmp/tap/Formula/slop.rb

          cd /tmp/tap
          sed -i \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_LINUX_X86_64/${SHA_LINUX_X86}/g" \
            -e "s/SHA256_LINUX_ARM64/${SHA_LINUX_ARM}/g" \
            -e "s/SHA256_MACOS_X86_64/${SHA_MACOS_X86}/g" \
            -e "s/SHA256_MACOS_ARM64/${SHA_MACOS_ARM}/g" \
            Formula/slop.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/slop.rb
          git commit -m "slop ${VERSION}" || true
          git push
